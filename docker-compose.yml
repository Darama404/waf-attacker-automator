# =============================================================================
# WAF Automator — Docker Compose
# =============================================================================
# Perintah umum:
#   Start    : docker compose up -d
#   Stop     : docker compose down
#   Logs     : docker compose logs -f waf-attacker-automator
#   Restart  : docker compose restart waf-attacker-automator
#   Rebuild  : docker compose up -d --build
# =============================================================================

services:
  waf-attacker-automator:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Version akan tampil di log startup dan notifikasi Telegram
        VERSION: "1.0.0"

    container_name: waf-attacker-automator

    # Restart otomatis kecuali di-stop manual
    # "unless-stopped" lebih aman dari "always" karena tidak restart
    # jika container sengaja di-stop via docker compose down
    restart: unless-stopped

    # Load semua env var dari file .env
    env_file:
      - .env

    # Health check: pastikan process masih hidup setiap 30 detik
    # Karena binary ini adalah long-running process (bukan HTTP server),
    # kita cek apakah process dengan nama "waf-attacker-automator" masih ada
    healthcheck:
      test: ["CMD-SHELL", "pgrep waf-attacker-automator || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # Logging: rotasi otomatis supaya disk tidak penuh
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # Maksimal 10MB per file log
        max-file: "5"     # Simpan 5 file terakhir = maks 50MB total

    # Resource limits
    # Service ini sangat ringan — 1 request/menit ke API
    # Naikkan jika nanti expand ke banyak zone sekaligus
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "64M"
        reservations:
          cpus: "0.05"
          memory: "32M"

    # Timezone container mengikuti host
    # Penting agar timestamp log konsisten dengan sistem lain
    environment:
      - TZ=Asia/Jakarta